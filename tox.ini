[tox]
requires =
	tox-uv
envlist =
	# Vary Pandas versions
	py314-neo4j6-pandas{2}-standard,
	# Vary Neo4j versions
	py314-neo4j{5,6}-pandas2-standard,
	# Vary Pandas
	py314-pandas{2}-pyarrow22-standard,
	# Vary PyArrow
	py314-pandas2-pyarrow{19, 20, 21, 22, 23}-standard,
	# Vary Python version
	py3{10, 11, 12, 13, 14}-pandas2-pyarrow22-standard,

	# Vary networkx versions only for relevant tests
	py314-neo4j6-pandas2-pyarrow23-networkx{2,3}-nx,
[testenv]
allowlist_externals =
	ruby
	bash
	rm
dependency_groups =
	test
deps =
	neo4j5: neo4j >= 5.0, < 6.0
	neo4j6: neo4j >= 6.0, < 7.0
	pandas2: pandas >= 2.2.2, < 3.0
	pandas2: numpy >= 2.0
	pyarrow19: pyarrow >= 19.0, < 20.0
	pyarrow20: pyarrow >= 20.0, < 21.0
	pyarrow21: pyarrow >= 21.0, < 22.0
	pyarrow22: pyarrow >= 22.0, < 23.0
	pyarrow23: pyarrow >= 23.0, < 24.0
	networkx2: networkx >= 2.0, < 3.0
	networkx3: networkx >= 3.0, < 4.0
commands =
;	standard: bash -ec 'pytest tests --include-enterprise --include-model-store-location && ruby ./doc/tests/test_docs.rb python3 -n test_enterprise' && pytest ./doc/tests/test_client_only_endpoints.py'
	standard: bash -ec 'pytest -x tests && ruby ./doc/tests/test_docs.rb python3 -n test_enterprise'
	ogb: pytest tests --include-enterprise --include-ogb
	rm -rf {envdir}/lib

