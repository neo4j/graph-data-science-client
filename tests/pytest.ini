[pytest]
markers =
    compatible_with_db_driver: mark a test as only being compatible with a certain Neo4j driver version
    ogb: mark a test as requiring the ogb dependency
    db_integration: mark a test that requires integartion with the database
filterwarnings =
    error
    ignore:datetime.datetime.utcfromtimestamp\(\) is deprecated:DeprecationWarning
    ignore:The @wait_container_is_ready decorator is deprecated and will be removed in a future version..*:DeprecationWarning
    ignore:The wait_for_logs function with string or callable predicates is deprecated and will be removed in a future version.*:DeprecationWarning
    ignore:.*BoltDriver.*:pytest.PytestUnraisableExceptionWarning
    ignore:unclosed.*BoltDriver.*:ResourceWarning
timeout = 600
